services:
  - type: web
    name: clinical-voice-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main_working:app --host 0.0.0.0 --port $PORT
    plan: free
    region: ohio
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: clinical-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: clinical-redis
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: WHISPER_MODEL
        value: base
      - key: LOG_LEVEL
        value: INFO
      - key: DEBUG
        value: "False"

  - type: redis
    name: clinical-redis
    plan: free
    region: ohio
    ipAllowList: [] # Only allow internal connections

databases:
  - name: clinical-db
    plan: free
    region: ohio
